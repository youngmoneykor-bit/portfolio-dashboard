name: Keepalive

on:
  schedule:
    - cron: '0 1 * * 0'   # 매주 일요일 01:00 UTC = 10:00 KST
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update keepalive timestamp
        run: |
          echo "last keepalive: $(date -u '+%Y-%m-%d %H:%M UTC')" > keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keepalive.txt
          git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')"
          git push
