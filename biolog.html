<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioLog — 대사·운동 모니터</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0f14; font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; color: #dde3ea; }
    input[type=range] { accent-color: #2dd4bf; width: 100%; }
    select option { background: #0b0f14; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #1e2830; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const STORAGE_KEY = "biolog:entries:v1";

const SEED = [
  { date:"2026-05-31", glucose:105, prevRpe:4, prevType:"저강도 유산소", todayRpe:9, todayType:"고강도 근력", sleepHours:9,   protein:"카제인",    fastingPlan:"평소", condition:3, notes:"역도화 첫 착용 / 풀ROM 집중 / 16,560kg" },
  { date:"2026-06-01", glucose:106, prevRpe:9, prevType:"고강도 근력",   todayRpe:1, todayType:"휴식",     sleepHours:7,   protein:"카제인",    fastingPlan:"평소", condition:4, notes:"특이사항 없음" },
  { date:"2026-06-02", glucose:98,  prevRpe:2, prevType:"저강도 유산소", todayRpe:7, todayType:"중강도",   sleepHours:6.5, protein:"카제인",    fastingPlan:"평소", condition:4, notes:"DOMS 매우 강력" },
  { date:"2026-06-03", glucose:101, prevRpe:7, prevType:"중강도",        todayRpe:4, todayType:"중강도",   sleepHours:8.5, protein:"없음",      fastingPlan:"평소", condition:4, notes:"단백질 대량 섭취" },
  { date:"2026-06-05", glucose:102, prevRpe:4, prevType:"저강도 유산소", todayRpe:7, todayType:"중강도",   sleepHours:6.5, protein:"없음",      fastingPlan:"평소", condition:4, notes:"등 루틴 진행" },
  { date:"2026-06-06", glucose:109, prevRpe:5, prevType:"중강도",        todayRpe:9, todayType:"고강도 근력", sleepHours:6, protein:"카제인",    fastingPlan:"평소", condition:4, notes:"데드 140kg / 스쿼트 100kg×5 / 15,089kg" },
  { date:"2026-06-09", glucose:99,  prevRpe:4, prevType:"저강도 유산소", todayRpe:6, todayType:"중강도",   sleepHours:7,   protein:"유청+카제인", fastingPlan:"평소", condition:4, notes:"리셋 주 / 5.5km 러닝" },
];

const C = { bg:"#0b0f14", panel:"#13191f", panel2:"#181f28", border:"#1e2830", text:"#dde3ea", sub:"#7a8898", faint:"#3d4d5c", teal:"#2dd4bf", coral:"#f08060", amber:"#f0b429", red:"#e05050", green:"#82c95e", blue:"#5b9cf6", purple:"#a78bfa" };
const SESSION = ["고강도 근력","중강도","저강도 유산소","휴식"];
const PROTEIN = ["없음","유청","카제인","유청+카제인"];
const FASTING = ["평소","16:8","24시간+"];
const today = () => new Date().toISOString().slice(0,10);
const blank = () => ({ date:today(), glucose:"", prevRpe:5, prevType:"중강도", todayRpe:5, todayType:"중강도", sleepHours:"", protein:"없음", fastingPlan:"평소", condition:3, notes:"" });

function store(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function load(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }

function rules(e, base, n) {
  const g=+e.glucose, pr=+e.prevRpe, tr=+(e.todayRpe??e.prevRpe), sl=+e.sleepHours;
  const hi_p=pr>=8, hi_t=tr>=8, no_prot=e.protein==="없음", good_prot=["카제인","유청+카제인"].includes(e.protein);
  const low_sl=e.sleepHours!==""&&sl<6, fast=e.fastingPlan!=="평소";
  const elev=n>=3&&base!=null&&g>base+12;
  const f=[];
  if(g>=126)      f.push({lv:"alert",title:"공복혈당 126 도달 — 당뇨 기준",msg:"재측정 및 의사 상담 권장."});
  if(g>=100&&g<126) f.push({lv:"warn",title:"전당뇨 범위 (100–125)",msg:"추세 지속 관찰."});
  if(elev)        f.push({lv:"warn",title:`기준치 대비 +${(g-base).toFixed(0)} mg/dL`,msg:"전날 세션·수면·단백질 조합 점검."});
  if(hi_p&&no_prot) f.push({lv:"warn",title:"Rule 1 — 전날 고강도 + 단백질 없음",msg:"코르티솔↑ → 당신생↑. 카제인 30g 추가."});
  if(hi_p&&good_prot) f.push({lv:"ok",title:"Rule 2 — 전날 고강도 + 카제인 ✓",msg:"서방형 아미노산으로 혈당 안정 기대."});
  if(low_sl)      f.push({lv:"warn",title:`Rule 3 — 수면 ${sl}h 부족`,msg:"인슐린저항↑. 당일 강도 조절 고려."});
  if(hi_t&&fast)  f.push({lv:"warn",title:"Rule 4 — 고강도 + 단식 이중 부하",msg:"단식일엔 강도를 낮춰."});
  if(g>95)        f.push({lv:"info",title:"Rule 5 — 새벽현상 가능성",msg:"기상 후 워킹 5분 후 재측정 권장."});
  if(hi_t&&no_prot) f.push({lv:"info",title:"오늘 고강도 — 취침 전 단백질 챙겨",msg:`RPE ${tr} 세션. 오늘 밤 카제인 필수.`});
  if(f.length===0) f.push({lv:"ok",title:"특이 플래그 없음 — 패턴 양호",msg:"현재 루틴 유지."});
  return f;
}

// ── Chart.js wrapper ──────────────────────────────────
function LineChart({ labels, datasets, yMin, yMax, refLines=[] }) {
  const ref = useRef(null);
  const chart = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, {
      type: "line",
      data: { labels, datasets: datasets.map(d => ({
        label: d.label, data: d.data, borderColor: d.color,
        backgroundColor: "transparent", pointBackgroundColor: d.color,
        pointRadius: 4, borderWidth: 2, spanGaps: true,
        borderDash: d.dash || [],
      }))},
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        scales: {
          x: { grid:{ color:C.border }, ticks:{ color:C.faint, font:{size:10} } },
          y: { min:yMin, max:yMax, grid:{ color:C.border }, ticks:{ color:C.faint, font:{size:10} } },
        },
        plugins: {
          legend: { display: datasets.length > 1, labels:{ color:C.sub, font:{size:11}, boxWidth:16 } },
          tooltip: { backgroundColor:C.panel2, borderColor:C.border, borderWidth:1, titleColor:C.sub, bodyColor:C.text },
          annotation: undefined,
        },
      },
      plugins: [{
        id:"refLines",
        afterDraw(ch) {
          const ctx=ch.ctx, yScale=ch.scales.y, xScale=ch.scales.x;
          refLines.forEach(r=>{
            const y=yScale.getPixelForValue(r.value);
            ctx.save(); ctx.strokeStyle=r.color; ctx.lineWidth=1; ctx.setLineDash([4,4]);
            ctx.beginPath(); ctx.moveTo(xScale.left,y); ctx.lineTo(xScale.right,y); ctx.stroke();
            ctx.restore();
          });
        }
      }],
    });
    return () => { if(chart.current) chart.current.destroy(); };
  }, [labels, datasets, yMin, yMax]);
  // 고정 높이 div로 감싸야 그래프 무한 늘어남 버그 방지
  return <div style={{ position:"relative", height:180 }}><canvas ref={ref} /></div>;
}

// ── Small Components ──────────────────────────────────
const inp = { background:C.bg, border:`1px solid ${C.border}`, borderRadius:6, color:C.text, padding:"7px 10px", fontSize:14, outline:"none", width:"100%", boxSizing:"border-box" };
const lbl = { fontSize:11, color:C.sub, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:4, display:"block" };

function F({label,children}){ return <div style={{display:"flex",flexDirection:"column",gap:4}}><span style={lbl}>{label}</span>{children}</div>; }
function Num({value,onChange,placeholder,min,max,step=1}){ return <input type="number" min={min} max={max} step={step} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inp} />; }
function Sel({value,onChange,opts}){ return <select value={value} onChange={e=>onChange(e.target.value)} style={{...inp,cursor:"pointer"}}>{opts.map(o=><option key={o} value={o}>{o}</option>)}</select>; }
function Slide({value,onChange,min=1,max=10}){ return <div style={{display:"flex",alignItems:"center",gap:10}}><input type="range" min={min} max={max} value={value} onChange={e=>onChange(+e.target.value)} /><span style={{color:C.teal,fontWeight:700,fontSize:16,minWidth:24,textAlign:"right"}}>{value}</span></div>; }
function Div({label}){ return <div style={{display:"flex",alignItems:"center",gap:10,margin:"4px 0"}}><div style={{flex:1,height:1,background:C.border}}/><span style={{fontSize:10,color:C.faint,letterSpacing:"0.1em",textTransform:"uppercase"}}>{label}</span><div style={{flex:1,height:1,background:C.border}}/></div>; }

function Flag({f}){
  const m={alert:{bg:"#2a1010",bc:C.red,tc:C.red,ic:"⚠"},warn:{bg:"#1e1a0a",bc:C.amber,tc:C.amber,ic:"⚡"},ok:{bg:"#0d1f12",bc:C.green,tc:C.green,ic:"✓"},info:{bg:"#0d1520",bc:C.blue,tc:C.blue,ic:"ℹ"}};
  const s=m[f.lv]||m.info;
  return <div style={{background:s.bg,border:`1px solid ${s.bc}`,borderRadius:8,padding:"10px 14px"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{color:s.tc}}>{s.ic}</span><span style={{color:s.tc,fontWeight:600,fontSize:13}}>{f.title}</span></div>
    <p style={{color:C.sub,fontSize:12,margin:0,lineHeight:1.5}}>{f.msg}</p>
  </div>;
}

// ── Main App ──────────────────────────────────────────
function App() {
  const [entries, setEntries] = useState([]);
  const [form, setForm]       = useState(blank());
  const [tab, setTab]         = useState("입력");
  const [loaded, setLoaded]   = useState(false);
  const [editing, setEditing]     = useState(null);
  const [toast, setToast]         = useState("");
  const [autoHandle, setAutoHandle] = useState(null); // File System Access API handle
  const fileRef    = useRef(null);
  const autoRef    = useRef(null); // autoHandle을 useEffect에서 참조용
  useEffect(() => { autoRef.current = autoHandle; }, [autoHandle]);

  useEffect(()=>{
    const stored=load(STORAGE_KEY);
    if(stored&&Array.isArray(stored)){
      const m=[...SEED]; stored.forEach(s=>{ const i=m.findIndex(e=>e.date===s.date); i>=0?m[i]=s:m.push(s); }); setEntries(m);
    } else setEntries(SEED);
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded) return;
    store(STORAGE_KEY, entries);
    // 자동저장 파일 핸들이 있으면 즉시 덮어쓰기
    if(autoRef.current) writeToFile(autoRef.current, entries);
  },[entries,loaded]);

  // File System Access API로 파일에 직접 쓰기
  const writeToFile = async (handle, data) => {
    try {
      const writable = await handle.createWritable();
      await writable.write(JSON.stringify({ exported_at: new Date().toISOString(), count: data.length, entries: data }, null, 2));
      await writable.close();
    } catch(e) { console.warn("자동저장 실패:", e); }
  };

  // 자동저장 위치 설정
  const setupAutoSave = async () => {
    if (!window.showSaveFilePicker) { showToast("이 브라우저는 자동저장 미지원 (Chrome 권장)"); return; }
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: "biolog_data.json",
        types: [{ description: "JSON 파일", accept: { "application/json": [".json"] } }],
      });
      setAutoHandle(handle);
      await writeToFile(handle, entries);
      showToast("자동저장 설정 완료 — 저장할 때마다 자동으로 덮어써");
    } catch(e) { if(e.name !== "AbortError") showToast("설정 취소됨"); }
  };

  const sorted = useMemo(()=>[...entries].sort((a,b)=>a.date.localeCompare(b.date)),[entries]);
  const baseline = useMemo(()=>{
    if(sorted.length<3) return null;
    const v=sorted.slice(-7).map(e=>+e.glucose).filter(v=>v>0);
    return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null;
  },[sorted]);

  const latest = sorted[sorted.length-1];
  const flags  = latest ? rules(latest,baseline,sorted.length) : [];

  const labels   = sorted.map(e=>e.date.slice(5));
  const glucoses = sorted.map(e=>+e.glucose||null);
  const prevRpes = sorted.map(e=>+e.prevRpe||null);
  const todayRpes= sorted.map(e=>+(e.todayRpe??e.prevRpe)||null);
  const sleeps   = sorted.map(e=>+e.sleepHours||null);

  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=()=>{
    if(!form.glucose||!form.sleepHours){alert("공복혈당과 수면시간은 필수야.");return;}
    const i=entries.findIndex(e=>e.date===form.date);
    if(i>=0){const u=[...entries];u[i]={...form};setEntries(u);}else setEntries(p=>[...p,{...form}]);
    setForm(blank()); setEditing(null); setTab("분석");
  };

  const edit=(e)=>{ setForm({date:e.date,glucose:e.glucose??"",prevRpe:e.prevRpe??5,prevType:e.prevType??"중강도",todayRpe:e.todayRpe??5,todayType:e.todayType??"중강도",sleepHours:e.sleepHours??"",protein:e.protein??"없음",fastingPlan:e.fastingPlan??"평소",condition:e.condition??3,notes:e.notes??""}); setEditing(e.date); setTab("입력"); window.scrollTo({top:0,behavior:"smooth"}); };
  const del=(date)=>{ if(confirm(`${date} 삭제?`)) setEntries(p=>p.filter(e=>e.date!==date)); };

  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify({exported_at:new Date().toISOString(),count:sorted.length,entries:sorted},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`biolog_data_${today()}.json`; a.click();
  };
  const importJSON=(e)=>{
    const file=e.target.files?.[0]; if(!file) return;
    const r=new FileReader(); r.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result), inc=p.entries??p;
        if(!Array.isArray(inc)) throw 0;
        setEntries(prev=>{const m=[...prev];inc.forEach(s=>{const i=m.findIndex(e=>e.date===s.date);i>=0?m[i]=s:m.push(s);});return m;});
        showToast(`완료 — ${inc.length}개 가져오기`);
      }catch{ showToast("오류 — 파일 형식 확인"); }
    }; r.readAsText(file); e.target.value="";
  };
  const showToast=(msg)=>{ setToast(msg); setTimeout(()=>setToast(""),3000); };

  const isEdit=editing!==null;

  return (
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:60}}>

      {/* Header */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>📊</span>
        <span style={{fontWeight:800,fontSize:18,letterSpacing:"-0.02em"}}>BioLog</span>
        <span style={{color:C.faint,fontSize:12}}>대사·운동 모니터</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {sorted.length>0&&<span style={{background:C.panel2,border:`1px solid ${C.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,color:C.sub}}>{sorted.length}일</span>}
          <input type="file" accept=".json" ref={fileRef} onChange={importJSON} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current?.click()} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer",color:C.sub,padding:"5px 10px",fontSize:12}}>↑ 가져오기</button>
          <button onClick={exportJSON} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer",color:C.sub,padding:"5px 10px",fontSize:12}}>↓ 내보내기</button>
          <button onClick={setupAutoSave} title="저장할 때마다 자동으로 파일에 덮어씀" style={{background:autoHandle?C.green:C.teal,border:"none",borderRadius:8,cursor:"pointer",color:"#0b0f14",padding:"5px 12px",fontSize:12,fontWeight:700}}>
            {autoHandle ? "🔗 자동저장 ON" : "📁 자동저장 설정"}
          </button>
        </div>
      </div>

      {toast&&<div style={{position:"fixed",top:60,right:16,zIndex:999,background:toast.startsWith("완료")?"#0d3a1f":"#3a0f0f",border:`1px solid ${toast.startsWith("완료")?C.green:C.red}`,borderRadius:8,padding:"10px 16px",color:toast.startsWith("완료")?C.green:C.red,fontSize:13,fontWeight:600}}>{toast}</div>}

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.panel}}>
        {["입력","분석","기록"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"12px 0",background:"none",border:"none",borderBottom:tab===t?`2px solid ${C.teal}`:"2px solid transparent",color:tab===t?C.teal:C.sub,fontWeight:tab===t?700:400,fontSize:14,cursor:"pointer"}}>{t}</button>
        ))}
      </div>

      <div style={{padding:"20px 16px",maxWidth:540,margin:"0 auto"}}>

        {/* ── 입력 ── */}
        {tab==="입력"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {isEdit&&<div style={{background:"#1a1500",border:`1px solid ${C.amber}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{color:C.amber,fontSize:13,fontWeight:600}}>✏️ {editing} 수정 중</span>
              <button onClick={()=>{setForm(blank());setEditing(null);}} style={{background:"none",border:"none",cursor:"pointer",color:C.faint,fontSize:12}}>✕ 취소</button>
            </div>}
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,padding:16,display:"flex",flexDirection:"column",gap:14}}>
              <F label="날짜">
                <input type="date" value={form.date} onChange={e=>sf("date",e.target.value)}
                  style={{...inp, cursor:"pointer", border:`1px solid ${C.teal}`, colorScheme:"dark", width:"100%"}} />
              </F>
              <F label="공복혈당 (mg/dL)"><Num value={form.glucose} onChange={v=>sf("glucose",v)} placeholder="예) 105" min={50} max={300}/></F>
              <F label="수면 시간 (h)"><Num value={form.sleepHours} onChange={v=>sf("sleepHours",v)} placeholder="예) 7.5" min={0} max={12} step={0.5}/></F>
              <Div label="전날 운동"/>
              <F label={`전날 RPE — ${form.prevRpe}`}><Slide value={form.prevRpe} onChange={v=>sf("prevRpe",v)}/></F>
              <F label="전날 운동 종류"><Sel value={form.prevType} onChange={v=>sf("prevType",v)} opts={SESSION}/></F>
              <Div label="당일 운동"/>
              <F label={`당일 RPE — ${form.todayRpe}`}><Slide value={form.todayRpe} onChange={v=>sf("todayRpe",v)}/></F>
              <F label="당일 운동 종류"><Sel value={form.todayType} onChange={v=>sf("todayType",v)} opts={SESSION}/></F>
              <Div label="영양 · 기타"/>
              <F label="취침 전 단백질"><Sel value={form.protein} onChange={v=>sf("protein",v)} opts={PROTEIN}/></F>
              <F label="단식 플랜"><Sel value={form.fastingPlan} onChange={v=>sf("fastingPlan",v)} opts={FASTING}/></F>
              <F label={`컨디션 — ${form.condition}/5`}><Slide value={form.condition} onChange={v=>sf("condition",v)} min={1} max={5}/></F>
              <F label="메모"><input value={form.notes} onChange={e=>sf("notes",e.target.value)} placeholder="역도화, 풀ROM 등..." style={inp}/></F>
              <button onClick={save} style={{background:isEdit?C.amber:C.teal,color:"#0b0f14",border:"none",borderRadius:8,padding:"12px 0",fontWeight:800,fontSize:15,cursor:"pointer",marginTop:4}}>
                {isEdit?"✏️ 수정 저장":"＋ 저장"}
              </button>
            </div>
          </div>
        )}

        {/* ── 분석 ── */}
        {tab==="분석"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {sorted.length===0
              ? <div style={{textAlign:"center",color:C.faint,padding:40}}>데이터 없음. 입력 탭에서 추가해봐.</div>
              : <>
                {latest&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[{label:"공복혈당",value:`${latest.glucose}`,unit:"mg/dL",color:+latest.glucose>=100?C.coral:C.teal},
                    {label:"수면",value:`${latest.sleepHours}`,unit:"h",color:+latest.sleepHours<6?C.amber:C.green},
                    {label:"전날 RPE",value:`${latest.prevRpe}`,unit:"/10",color:+latest.prevRpe>=8?C.coral:C.blue},
                    {label:"당일 RPE",value:`${latest.todayRpe??"-"}`,unit:"/10",color:+(latest.todayRpe)>=8?C.coral:C.purple},
                  ].map(c=>(
                    <div key={c.label} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 10px",textAlign:"center"}}>
                      <div style={{fontSize:10,color:C.sub,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>{c.label}</div>
                      <div style={{fontSize:22,fontWeight:800,color:c.color}}>{c.value}</div>
                      <div style={{fontSize:10,color:C.faint}}>{c.unit}</div>
                    </div>
                  ))}
                </div>}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <span style={{...lbl}}>룰 엔진 분석</span>
                  {flags.map((f,i)=><Flag key={i} f={f}/>)}
                </div>
                <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 12px 12px"}}>
                  <span style={{...lbl}}>공복혈당 추세</span>
                  <LineChart labels={labels} datasets={[{label:"공복혈당",data:glucoses,color:C.teal}]} yMin={80} yMax={140} refLines={[{value:100,color:C.amber},{value:126,color:C.red}]}/>
                </div>
                <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 12px 12px"}}>
                  <span style={{...lbl}}>RPE · 수면 추세</span>
                  <LineChart labels={labels} datasets={[{label:"전날RPE",data:prevRpes,color:C.coral},{label:"당일RPE",data:todayRpes,color:C.purple,dash:[4,2]},{label:"수면",data:sleeps,color:C.blue}]} yMin={0} yMax={10} refLines={[{value:8,color:C.coral}]}/>
                </div>
              </>
            }
          </div>
        )}

        {/* ── 기록 ── */}
        {tab==="기록"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sorted.length===0
              ? <div style={{textAlign:"center",color:C.faint,padding:40}}>기록 없음</div>
              : [...sorted].reverse().map(e=>(
                <div key={e.date} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontWeight:700,fontSize:14,color:C.teal}}>{e.date}</span>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>edit(e)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",color:C.sub,padding:"3px 8px",fontSize:11}}>✏ 수정</button>
                      <button onClick={()=>del(e.date)} style={{background:"none",border:"none",cursor:"pointer",color:C.faint,padding:4}}>🗑</button>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 16px",fontSize:12,color:C.sub}}>
                    <span>혈당 <b style={{color:C.text}}>{e.glucose} mg/dL</b></span>
                    <span>수면 <b style={{color:C.text}}>{e.sleepHours}h</b></span>
                    <span>전날RPE <b style={{color:C.coral}}>{e.prevRpe}</b> · {e.prevType}</span>
                    <span>당일RPE <b style={{color:C.purple}}>{e.todayRpe??"-"}</b> · {e.todayType??"-"}</span>
                    <span>단백질 <b style={{color:C.text}}>{e.protein}</b></span>
                    <span>컨디션 <b style={{color:C.text}}>{e.condition}/5</b></span>
                  </div>
                  {e.notes&&<div style={{marginTop:6,fontSize:11,color:C.faint,fontStyle:"italic"}}>{e.notes}</div>}
                </div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
